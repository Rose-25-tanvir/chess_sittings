name: Validate Settings JSON
on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Validate JSON
        run: |
          if jq empty settings.json; then
            echo "JSON is valid"
          else
            echo "Invalid JSON format in settings.json"
            exit 1
          fi
